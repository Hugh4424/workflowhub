name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run check
      
      # M10 baseline smoke (Phase 5)
      - run: node scripts/agenthub-baseline.mjs --smoke
      # M10 field-mapping schema validation
      - run: node -e "const fs=require('fs');const Ajv=require('ajv');const ajv=new Ajv();const schema=JSON.parse(fs.readFileSync('contracts/field-mapping.schema.json','utf-8'));const validate=ajv.compile(schema);const sample={mappings:[{metric_name:'test',journal_event:'e',workflowhub_field:'f',formula:'x',polarity:'↑ better',source_type:'proxy',missing_behavior:'null'},{metric_name:'t2',journal_event:'e2',workflowhub_field:'f2',formula:'y',polarity:'↓ better',source_type:'weak_proxy',missing_behavior:'skip'},{metric_name:'t3',journal_event:'e3',workflowhub_field:'f3',formula:'z',polarity:'↑ better',source_type:'direct',missing_behavior:'null'},{metric_name:'t4',journal_event:'e4',workflowhub_field:'f4',formula:'w',polarity:'↓ better',source_type:'proxy',missing_behavior:'skip'},{metric_name:'t5',journal_event:'e5',workflowhub_field:'f5',formula:'v',polarity:'↑ better',source_type:'weak_proxy',missing_behavior:'null'}]};const valid=validate(sample);if(!valid){console.error(JSON.stringify(validate.errors));process.exit(1)}console.log('M10 schema: PASS ('+sample.mappings.length+' rows validated)');"
      # M10 vitest
      - run: node_modules/.bin/vitest run tests/agenthub-baseline.test.mjs tests/metrics-smoke.test.mjs --passWithNoTests=false
      # verify-code smoke (M9 Phase 5)
      - run: node_modules/.bin/vitest run tests/verify-code-capture.test.mjs tests/verify-code-freshness.test.mjs tests/verify-code-facts.test.mjs --passWithNoTests=false
      - run: npm test
      # lightweight 3-stage chain structural check (M9 Phase 5, F10: no heavy E2E)
      - run: node scripts/ci-chain-check.mjs --task-id=m9-verify-code
