name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run check
      
      # M10 baseline smoke (Phase 5)
      - run: node scripts/agenthub-baseline.mjs --smoke
      # M10 field-mapping schema validation (structural, no external deps)
      - run: node -e "const fs=require('fs');const s=JSON.parse(fs.readFileSync('contracts/field-mapping.schema.json','utf-8'));console.assert(s.title,'missing title');console.assert(s.properties.mappings.minItems===5,'expect 5 minItems');console.assert(s.properties.mappings.items.required.length===7,'expect 7 required fields');const validTypes=['direct','proxy','weak_proxy'];console.assert(s.properties.mappings.items.properties.source_type.enum.every(t=>validTypes.includes(t)),'source_type enum mismatch');console.log('M10 schema: PASS (5 rows, 7 cols, source_type whitelist verified)')"
      # M10 vitest
      - run: node_modules/.bin/vitest run tests/agenthub-baseline.test.mjs tests/metrics-smoke.test.mjs --passWithNoTests=false
      # verify-code smoke (M9 Phase 5)
      - run: node_modules/.bin/vitest run tests/verify-code-capture.test.mjs tests/verify-code-freshness.test.mjs tests/verify-code-facts.test.mjs --passWithNoTests=false
      - run: npm test
      # lightweight 3-stage chain structural check (M9 Phase 5, F10: no heavy E2E)
      - run: node scripts/ci-chain-check.mjs --task-id=m9-verify-code
