name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run check
      
      # M10 baseline smoke (Phase 5)
      - run: node scripts/agenthub-baseline.mjs --smoke
      # M10 field-mapping schema validation (validates real spec data)
      - run: node -e "const fs=require('fs');const s=JSON.parse(fs.readFileSync('contracts/field-mapping.schema.json','utf-8'));const validTypes=['direct','proxy','weak_proxy'];console.assert(s.properties.mappings.minItems===5,'minItems');console.assert(s.properties.mappings.items.required.length===7,'7 required');const md=fs.readFileSync('specs/m10-baseline-switch/field-mapping.md','utf-8');const rows=md.split('\n').filter(l=>l.startsWith('|')&&l.includes('proxy')||l.includes('weak_proxy')||l.includes('direct'));console.assert(rows.length>=5,'expect 5+ data rows in field-mapping.md, got '+rows.length);for(const r of rows){const t=r.split('|').map(c=>c.trim()).filter(Boolean);const st=t[5];console.assert(validTypes.includes(st),'invalid source_type in row: '+st)}console.log('M10 field-mapping: PASS ('+rows.length+' rows with valid source_types)')"
      # M10 vitest
      - run: node_modules/.bin/vitest run tests/agenthub-baseline.test.mjs tests/metrics-smoke.test.mjs --passWithNoTests=false
      # verify-code smoke (M9 Phase 5)
      - run: node_modules/.bin/vitest run tests/verify-code-capture.test.mjs tests/verify-code-freshness.test.mjs tests/verify-code-facts.test.mjs --passWithNoTests=false
      - run: npm test
      # lightweight 3-stage chain structural check (M9 Phase 5, F10: no heavy E2E)
      - run: node scripts/ci-chain-check.mjs --task-id=m9-verify-code
